<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차관리</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3B82F6">
<style>
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#F3F6FB;margin:0;padding:14px;}
.card{background:#fff;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.06);}
.big{font-size:36px;font-weight:900;color:#2563EB;}
button{padding:10px;border-radius:12px;border:0;font-weight:700;}
.primary{background:#2563EB;color:#fff;}
.ghost{background:#EEF2FF;}
.danger{background:#FEE2E2;color:#B91C1C;}
.list{max-height:340px;overflow:auto;}
</style>
</head>
<body>

<div class="card">
<div id="savedAt">미저장</div>
<div>남은 연차</div>
<div class="big" id="remain">0</div>
</div>

<div class="card">
<input type="number" id="total" placeholder="총 연차"><br><br>
<input type="date" id="date"><br><br>
<select id="type">
<option value="1" data-label="연차">연차(1)</option>
<option value="0.5" data-label="오전반차">오전반차(0.5)</option>
<option value="0.5" data-label="오후반차">오후반차(0.5)</option>
</select><br><br>
<input type="text" id="memo" placeholder="메모"><br><br>
<button class="primary" onclick="add()">기록</button>
</div>

<div class="card">
<div class="list" id="list"></div>
</div>

<div class="card">
<button class="ghost" onclick="backup()">백업</button>
<button class="ghost" onclick="restore()">복원</button>
<button class="danger" onclick="resetAll()">초기화</button>
<input type="file" id="file" style="display:none">
</div>

<script>
const KEY="leave_v8_3";
let state={total:15,records:[],updated:null};

function save(){
 state.updated=new Date().toISOString();
 localStorage.setItem(KEY,JSON.stringify(state));
 document.getElementById("savedAt").innerText="저장: "+new Date(state.updated).toLocaleString();
}

function load(){
 const raw=localStorage.getItem(KEY);
 if(raw) state=JSON.parse(raw);
}

function render(){
 const used=state.records.reduce((s,r)=>s+parseFloat(r.amount),0);
 const remain=Math.max(0,state.total-used);
 document.getElementById("remain").innerText=remain;
 const list=document.getElementById("list");
 list.innerHTML="";
 state.records.forEach(r=>{
   const div=document.createElement("div");
   div.innerHTML=r.date+" "+r.label+" "+(r.memo||"")+" <button onclick='del(""+r.id+"")'>삭제</button>";
   list.appendChild(div);
 });
 document.getElementById("savedAt").innerText=state.updated?"저장: "+new Date(state.updated).toLocaleString():"미저장";
}

function add(){
 const date=document.getElementById("date").value;
 if(!date) return alert("날짜 선택");
 const sel=document.getElementById("type");
 state.records.push({
   id:Date.now()+"",
   date,
   amount:sel.value,
   label:sel.options[sel.selectedIndex].getAttribute("data-label"),
   memo:document.getElementById("memo").value
 });
 save(); render();
}

function del(id){
 state.records=state.records.filter(r=>r.id!==id);
 save(); render();
}

function backup(){
 const today=new Date().toISOString().slice(0,10);
 const filename="연차백업_"+today+".json";
 const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
 const url=URL.createObjectURL(blob);
 const a=document.createElement("a");
 a.href=url; a.download=filename; a.click();
 URL.revokeObjectURL(url);
}

function restore(){
 document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change",e=>{
 const file=e.target.files[0];
 const reader=new FileReader();
 reader.onload=()=>{
   state=JSON.parse(reader.result);
   save(); render();
   alert("복원 완료");
 };
 reader.readAsText(file);
});

function resetAll(){
 if(confirm("초기화?")){
  state={total:15,records:[],updated:null};
  localStorage.removeItem(KEY);
  render();
 }
}

load(); render();

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("./service-worker.js");
}
</script>
</body>
</html>
