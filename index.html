<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차관리 V6</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#ffffff;color:#222;}
.container{max-width:420px;margin:0 auto;padding:12px;}
h1{font-size:18px;text-align:center;margin:6px 0 12px 0;}
.summary{text-align:center;font-size:14px;margin-bottom:10px;}
.card{border:1px solid #e5e5e5;border-radius:10px;padding:10px;margin-bottom:10px;}
.row{display:flex;gap:6px;margin-bottom:6px;}
input,select,button{font-size:14px;padding:6px;border-radius:6px;border:1px solid #ddd;flex:1;}
button{background:#f5f5f5;cursor:pointer;}
button.primary{background:#111;color:#fff;border:none;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border-bottom:1px solid #eee;padding:6px 4px;text-align:center;}
.record-area{max-height:240px;overflow-y:auto;}
.small-btn{font-size:12px;padding:4px 6px;}
</style>
</head>
<body>

<div class="container">

<h1>연차 관리</h1>

<div class="summary">
총 연차: <strong id="total">15</strong> |
사용: <strong id="used">0</strong> |
잔여: <strong id="remain">15</strong>
</div>

<div class="card">
<div class="row">
<input type="number" id="totalInput" placeholder="총 연차 수정">
<button onclick="updateTotal()">적용</button>
</div>
</div>

<div class="card">
<div class="row">
<input type="date" id="date">
</div>
<div class="row">
<select id="type">
<option value="1">연차 (1)</option>
<option value="0.5">오전반차 (0.5)</option>
<option value="0.5">오후반차 (0.5)</option>
</select>
</div>
<div class="row">
<input type="text" id="reason" placeholder="사유 (선택)">
</div>
<div class="row">
<button class="primary" onclick="addRecord()">추가</button>
</div>
</div>

<div class="card record-area">
<table>
<thead>
<tr>
<th>날짜</th>
<th>구분</th>
<th>사유</th>
<th>삭제</th>
</tr>
</thead>
<tbody id="records"></tbody>
</table>
</div>

<div class="card">
<div class="row">
<button onclick="backup()">백업</button>
<button onclick="restore()">복원</button>
</div>
<input type="file" id="fileInput" style="display:none">
</div>

</div>

<script>
let total = 15;
let records = [];

function updateSummary(){
    const used = records.reduce((sum,r)=>sum+parseFloat(r.type),0);
    document.getElementById("total").textContent = total;
    document.getElementById("used").textContent = used;
    document.getElementById("remain").textContent = (total-used).toFixed(1);
}

function updateTotal(){
    const val = parseFloat(document.getElementById("totalInput").value);
    if(!isNaN(val)) total = val;
    updateSummary();
}

function addRecord(){
    const date = document.getElementById("date").value;
    const type = document.getElementById("type").value;
    const reason = document.getElementById("reason").value;
    if(!date) return alert("날짜 선택");

    records.push({date,type,reason});
    render();
}

function deleteRecord(i){
    records.splice(i,1);
    render();
}

function render(){
    const tbody = document.getElementById("records");
    tbody.innerHTML="";
    records.sort((a,b)=>b.date.localeCompare(a.date));
    records.forEach((r,i)=>{
        tbody.innerHTML += `
        <tr>
            <td>${r.date}</td>
            <td>${r.type}</td>
            <td>${r.reason||""}</td>
            <td><button class="small-btn" onclick="deleteRecord(${i})">X</button></td>
        </tr>`;
    });
    updateSummary();
}

function backup(){
    const blob = new Blob([JSON.stringify({total,records})],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="leave_backup.json";
    a.click();
}

function restore(){
    const input=document.getElementById("fileInput");
    input.click();
    input.onchange=e=>{
        const file=e.target.files[0];
        const reader=new FileReader();
        reader.onload=()=>{
            const data=JSON.parse(reader.result);
            total=data.total;
            records=data.records||[];
            render();
        };
        reader.readAsText(file);
    };
}

updateSummary();
</script>

</body>
</html>
